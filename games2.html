<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Car Race</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏎️</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">

    <style>
        :root { --neon-blue: #00f2ff; --neon-pink: #ff007b; --bg: #0d0d0f; }
        *, *::before, *::after { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Roboto Mono', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; overflow: hidden; }

        #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

        #canvas-wrapper {
            position: relative;
            width: min(95vw, calc(97dvh * (2 / 3)));
            aspect-ratio: 2 / 3;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #111;
            border: 3px solid #333;
            border-radius: 12px;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            z-index: 10;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
        }
        .hidden { display: none !important; }

        h1 { font-size: clamp(1.2rem, 6vw, 2rem); margin: 0; background: linear-gradient(to right, var(--neon-blue), var(--neon-pink)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        button { width: min(280px, 85vw); padding: 15px; margin: 10px 0; font-family: 'Roboto Mono'; cursor: pointer; background: none; color: white; border: 2px solid var(--neon-blue); border-radius: 8px; transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
        button:hover { background: rgba(0, 242, 255, 0.08); }

        .hud { position: absolute; top: 12px; left: 0; width: 100%; display: flex; justify-content: space-around; font-weight: bold; color: var(--neon-blue); z-index: 5; pointer-events: none; font-size: 0.75rem; }

        .home-link { display: inline-block; margin-top: 16px; font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; color: rgba(255,255,255,0.3); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
        .home-link:hover { color: rgba(255,255,255,0.7); }

        #mobile-input { position: fixed; bottom: 1px; left: 50%; width: 1px; height: 1px; opacity: 0; font-size: 16px; border: none; outline: none; pointer-events: none; }
        #kb-strip { position: fixed; left: 0; right: 0; bottom: 0; height: 52px; background: rgba(0,0,0,0.97); border-top: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; z-index: 100; padding: 0 10px; gap: 8px; font-family: 'Roboto Mono', monospace; }
        #kb-strip .kb-lane-btn { background: rgba(255,0,123,0.18); border: 1px solid rgba(255,0,123,0.4); color: white; padding: 9px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; touch-action: manipulation; font-family: 'Roboto Mono', monospace; min-width: 80px; }
        #kb-strip .kb-type-btn { flex: 1; background: rgba(0,242,255,0.1); border: 1px solid rgba(0,242,255,0.3); color: var(--neon-blue); padding: 9px 10px; border-radius: 8px; font-size: 0.73rem; font-weight: 700; cursor: pointer; text-align: center; touch-action: manipulation; }

        @media (max-height: 500px) {
            button { padding: 9px 15px; margin: 5px 0; font-size: 0.8rem; }
            h1 { font-size: 1.1rem !important; }
        }
        @media (max-width: 380px) {
            button { padding: 10px 12px; font-size: 0.78rem; }
            h1 { font-size: 1rem !important; }
            .overlay { padding: 12px; }
        }
        #landscape-warn { display: none; position: fixed; inset: 0; background: #0d0d0f; z-index: 999; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 10px; color: white; font-family: 'Roboto Mono', monospace; }
        @media (orientation: landscape) and (max-height: 500px) { #landscape-warn { display: flex; } }
    </style>
</head>
<body>

<div id="landscape-warn"><div style="font-size:3rem">🔄</div><div style="font-size:1.1rem;font-weight:700">Rotate your device</div><div style="font-size:0.8rem;color:#888;margin-top:4px">Car Race plays in portrait mode</div></div>
<div id="game-container">
    <div id="canvas-wrapper">
        <div class="hud">
            <div>SCORE: <span id="hud-score">0</span></div>
            <div style="color:var(--neon-pink)"><span id="hud-speed">40</span> KM/H</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="menu-start" class="overlay">
            <h1>CAR RACE</h1>
            <p style="color: #888; font-size: 0.7rem;">MOBILE RESPONSIVE MODE</p>
            <button onclick="startGame('TRAINING')">1. TRAINING <span>[1]</span></button>
            <button onclick="startGame('REAL')">2. REAL PLAY <span>[2]</span></button>
            <button onclick="startGame('WORD')">3. WORD PLAY <span>[3]</span></button>
            <a href="index.html" class="home-link">← Back to Arcade Hub</a>
        </div>

        <div id="menu-over" class="overlay hidden">
            <h1 style="color: var(--neon-pink); -webkit-text-fill-color: var(--neon-pink);">CRASHED</h1>
            <p>FINAL SCORE: <span id="final-score">0</span></p>
            <p id="hs-note" style="color:#ffd700;font-size:0.72rem;font-weight:700;min-height:1.2em;margin:4px 0;"></p>
            <button onclick="retryGame()">TRY AGAIN <span>[RETRY]</span></button>
            <a href="index.html" class="home-link">← Back to Arcade Hub</a>
        </div>
    </div>
</div>
<div id="kb-strip" class="hidden">
    <button class="kb-lane-btn" onclick="moveLeft()">◄ LANE</button>
    <div class="kb-type-btn" onclick="document.getElementById('mobile-input').focus()">⌨️ Tap to Type</div>
    <button class="kb-lane-btn" onclick="moveRight()">LANE ►</button>
</div>
<input id="mobile-input" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="characters">
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    
    canvas.width = 400;
    canvas.height = 600;

    const NEON_BLUE = "#00f2ff";
    const NEON_PINK = "#ff007b";
    const TYPING_TIERS = ["FJ", "FJDK", "ASDFJKL;", "ASDFJKL;EI", "ABCDEFGHIJKLMNOPQRSTUVWXYZ"];
    const WORDS = [
        [], [],
        ["AN","AT","BE","BY","DO","GO","HE","IF","IN","IS","IT","ME","MY","NO","OF","ON","OR","SO","TO","UP","US","WE"],
        ["AND","ARE","BUT","CAN","DID","FOR","GET","GOT","HAD","HAS","HIM","HIS","HOW","ITS","LET","MAN","MAY","NOT","NOW","OUT","OWN","PUT","SAY","SEE","SHE","THE","TOO","TWO","USE","WAS","WHO","WHY","YOU"],
        ["ALSO","BACK","BEEN","COME","DARK","DOWN","FIND","FIVE","FROM","GIVE","GOOD","HAND","HAVE","HERE","HIGH","HOME","INTO","JUST","KEEP","KIND","KNOW","LAST","LEFT","LIKE","LIVE","LONG","LOOK","MADE","MAKE","MANY","MORE","MOST","MOVE","MUCH","MUST","NAME","NEAR","NEED","NEXT","ONCE","ONLY","OPEN","OVER","PART","PAST","PLAY","REAL","SAME","SAVE","SEEM","SEND","SIDE","SOME","SOON","TAKE","TELL","THAN","THEM","THEN","THEY","THIS","TIME","TURN","VERY","WANT","WAYS","WELL","WENT","WERE","WHAT","WHEN","WILL","WITH","WORD","WORK","YEAR","YOUR"],
        ["ABOUT","AFTER","AGAIN","BLACK","BRING","BUILD","COULD","EVERY","FOUND","GREAT","GROUP","HOUSE","LARGE","LATER","LIGHT","MIGHT","NEVER","OTHER","PLACE","POINT","RIGHT","SMALL","SOUND","STAND","START","STILL","STUDY","THEIR","THERE","THESE","THINK","THREE","UNDER","UNTIL","WATCH","WATER","WHERE","WHICH","WHILE","WHITE","WORLD","WOULD","WRITE","YOUNG"],
        ["ALMOST","ALWAYS","AROUND","BEHIND","BETTER","DURING","ENOUGH","FAMILY","FOLLOW","FRIEND","LITTLE","NUMBER","PEOPLE","REALLY","SCHOOL","SHOULD","SIMPLE","SINGLE","SLOWLY","THINGS","TRAVEL","WITHIN"]
    ];

    let gameState = 'START';
    let gameMode = 'REAL';
    let score = 0, jumpSuccessCount = 0, baseSpeed = 4.5, speedKmh = 40;
    let obstacles = [], bonuses = [], spawnTimer = 0, lastTime = performance.now();
    let typedBuffer = '';

    const player = { lane: 1, x: 200, y: 500, w: 36, h: 60, isJumping: false, jumpH: 0, jumpV: 0, gravity: 0.8, jumpPower: 17 };

    // --- Input Logic ---
    function moveLeft() { if(player.lane > 0) { player.lane--; typedBuffer = ''; } }
    function moveRight() { if(player.lane < 2) { player.lane++; typedBuffer = ''; } }
    function attemptJump(key = null) {
        if (!player.isJumping) {
            const target = obstacles.find(o => o.lane === player.lane && o.y < player.y && o.y > player.y - 300);
            const k = key ? key.toUpperCase() : null;
            if ((gameMode === 'TRAINING') || (gameMode === 'REAL' && target && (k === target.char || k === null))) {
                player.isJumping = true;
                player.jumpV = player.jumpPower;
                if(target) target.jumped = true;
            }
        }
    }

    function getWordLen2() { return Math.min(2 + Math.floor(jumpSuccessCount / 10), 6); }
    function getRandomWord2() { const arr = WORDS[getWordLen2()]; return arr[Math.floor(Math.random() * arr.length)]; }

    function attemptWordInput(key) {
        if (player.isJumping) return;
        const target = obstacles.find(o => o.lane === player.lane && o.y < player.y && o.y > player.y - 300);
        if (!target || !target.word) return;
        const k = key.toUpperCase();
        if (!/^[A-Z]$/.test(k)) { typedBuffer = ''; return; }
        typedBuffer += k;
        if (target.word.startsWith(typedBuffer)) {
            if (typedBuffer === target.word) {
                player.isJumping = true; player.jumpV = player.jumpPower; target.jumped = true; typedBuffer = '';
            }
        } else {
            typedBuffer = k;
            if (!target.word.startsWith(typedBuffer)) typedBuffer = '';
        }
    }

    const mobileInput = document.getElementById('mobile-input');
    const kbStrip = document.getElementById('kb-strip');
    const isMobile = 'ontouchstart' in window;

    // ── Sound Effects (Web Audio API) ──────────────────────
    let _ac=null; const getAC=()=>{if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();return _ac;};
    function playJump(){try{const c=getAC(),t=c.currentTime;[523,659,784].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;const s=t+i*.07;g.gain.setValueAtTime(.22,s);g.gain.exponentialRampToValueAtTime(.001,s+.13);o.start(s);o.stop(s+.13);});}catch(e){}}
    function playCrash(){try{const c=getAC(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.setValueAtTime(320,t);o.frequency.exponentialRampToValueAtTime(65,t+.6);g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.65);o.start(t);o.stop(t+.65);}catch(e){}}
    function playApplause(){try{const c=getAC(),t=c.currentTime,b=c.createBuffer(1,c.sampleRate*1.4,c.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;const src=c.createBufferSource();src.buffer=b;const bpf=c.createBiquadFilter();bpf.type='bandpass';bpf.frequency.value=1100;bpf.Q.value=.4;const ng=c.createGain();src.connect(bpf);bpf.connect(ng);ng.connect(c.destination);ng.gain.setValueAtTime(0,t);ng.gain.linearRampToValueAtTime(.3,t+.2);ng.gain.exponentialRampToValueAtTime(.001,t+1.3);src.start(t);src.stop(t+1.4);[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=f;const st=t+i*.09;g.gain.setValueAtTime(.18,st);g.gain.exponentialRampToValueAtTime(.001,st+.4);o.start(st);o.stop(st+.4);});}catch(e){}}

    mobileInput.addEventListener('input', () => {
        const val = mobileInput.value;
        if (!val || gameState !== 'PLAYING') return;
        const key = val[val.length - 1].toUpperCase();
        mobileInput.value = '';
        if (gameMode === 'WORD') attemptWordInput(key);
        else if (gameMode === 'REAL') attemptJump(key);
    });

    function updateKbPos() {
        if (!isMobile || !window.visualViewport) return;
        const vv = window.visualViewport;
        kbStrip.style.bottom = Math.max(0, window.innerHeight - vv.height - vv.offsetTop) + 'px';
    }
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateKbPos);
        window.visualViewport.addEventListener('scroll', updateKbPos);
    }

    // Touch Handling (Tap left side, right side, or center)
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touchX = (e.touches[0].clientX - rect.left) / rect.width * canvas.width;
        
        if (touchX < canvas.width * 0.3) moveLeft();
        else if (touchX > canvas.width * 0.7) moveRight();
        else if (gameMode === 'TRAINING') attemptJump();
        else if (gameState === 'PLAYING') mobileInput.focus();
    }, { passive: false });

    window.addEventListener('keydown', (e) => {
        if (gameState === 'START') {
            if (e.key === "1") startGame('TRAINING');
            if (e.key === "2") startGame('REAL');
            if (e.key === "3") startGame('WORD');
        } else if (gameState === 'PLAYING') {
            if (e.key === "ArrowLeft") moveLeft();
            if (e.key === "ArrowRight") moveRight();
            if (gameMode === 'WORD') { if (e.key.length === 1) attemptWordInput(e.key); }
            else if (e.key === " " || e.key.length === 1) attemptJump(e.key);
        } else if (gameState === 'OVER' && e.key === "Enter") {
            retryGame();
        }
    });

    function startGame(mode) {
        gameMode = mode; score = 0; jumpSuccessCount = 0; baseSpeed = 4.5; speedKmh = 40;
        obstacles = []; bonuses = []; player.lane = 1; gameState = 'PLAYING'; typedBuffer = ''; player.isJumping = false; player.jumpH = 0; 
        document.querySelectorAll('.overlay').forEach(m => m.classList.add('hidden'));
        lastTime = performance.now();
        if (isMobile && (gameMode === 'REAL' || gameMode === 'WORD')) { kbStrip.classList.remove('hidden'); setTimeout(() => mobileInput.focus(), 350); }
        else kbStrip.classList.add('hidden');
    }

    function retryGame() { startGame(gameMode); }
    function stopGame() { gameState = 'START'; document.getElementById('menu-over').classList.add('hidden'); document.getElementById('menu-start').classList.remove('hidden'); kbStrip.classList.add('hidden'); }
  
    function update(dt) {
        if(gameState !== 'PLAYING') return;
        const LANE_X = [66, 200, 333];
        const targetX = LANE_X[player.lane] - player.w/2;
        player.x += (targetX - player.x) * (0.2 * dt);

        if(player.isJumping) {
            player.jumpH += player.jumpV * dt;
            player.jumpV -= player.gravity * dt;
            if(player.jumpH <= 0) { player.jumpH = 0; player.isJumping = false; }
        }

        spawnTimer += dt;
        if(spawnTimer > Math.max(25, 70 - (speedKmh/6))) {
            const lane = Math.floor(Math.random() * 3);
            if (gameMode === 'WORD') {
                obstacles.push({ lane, x: LANE_X[lane], y: -100, word: getRandomWord2(), jumped: false });
            } else if (gameMode === 'TRAINING') {
                obstacles.push({ lane, x: LANE_X[lane], y: -100, jumped: false });
            } else {
                const tier = TYPING_TIERS[Math.min(Math.floor(jumpSuccessCount / 10), TYPING_TIERS.length - 1)];
                obstacles.push({ lane, x: LANE_X[lane], y: -100, char: tier[Math.floor(Math.random() * tier.length)], jumped: false });
            }
            spawnTimer = 0;
        }

        for(let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i]; o.y += baseSpeed * dt;
            if(Math.abs((player.x + player.w/2) - o.x) < 25 && Math.abs((player.y + 20) - (o.y + 30)) < 40) {
                if(player.jumpH < 35) {
                    const _hsKey = 'carRaceHS_' + gameMode;
                    const _hs = parseInt(localStorage.getItem(_hsKey) || '0');
                    const _newHS = score > _hs;
                    if (_newHS) localStorage.setItem(_hsKey, score);
                    gameState = 'OVER'; document.getElementById('final-score').innerText = score; document.getElementById('menu-over').classList.remove('hidden'); kbStrip.classList.add('hidden');
                    document.getElementById('hs-note').innerText = _newHS ? '🏆 NEW HIGH SCORE!' : 'Best: ' + _hs;
                    playCrash();
                    if (_newHS) setTimeout(playApplause, 500);
                }
            }
            if(o.y > canvas.height) {
                if(o.jumped) {
                    score += 50; jumpSuccessCount++; playJump(); if(jumpSuccessCount % 5 === 0) { baseSpeed += 0.2; speedKmh += 1; }
                    bonuses.push({x: player.x+20, y: player.y, t: "+50", c: NEON_BLUE, l: 1});
                } else { score += 10; }
                obstacles.splice(i, 1);
            }
        }
        for(let i = bonuses.length-1; i>=0; i--) { bonuses[i].y -= 2 * dt; bonuses[i].l -= 0.03 * dt; if(bonuses[i].l <= 0) bonuses.splice(i, 1); }
        document.getElementById('hud-score').innerText = score; document.getElementById('hud-speed').innerText = speedKmh;
    }

    function draw() {
        ctx.fillStyle = "#111"; ctx.fillRect(0,0, canvas.width, canvas.height);
        ctx.fillStyle = "#18181c"; ctx.fillRect(20, 0, canvas.width-40, canvas.height);
        ctx.strokeStyle = "#252528"; ctx.setLineDash([20, 30]);
        for(let i=1; i<3; i++) { ctx.beginPath(); ctx.moveTo(i * (canvas.width/3), 0); ctx.lineTo(i * (canvas.width/3), canvas.height); ctx.stroke(); }
        obstacles.forEach(o => {
            if (gameMode === 'WORD') {
                ctx.fillStyle = "#5a189a"; ctx.beginPath(); ctx.roundRect(o.x-18, o.y, 36, 58, 5); ctx.fill();
                ctx.font = "bold 11px Roboto Mono"; ctx.textAlign = "center";
                ctx.fillStyle = "white"; ctx.fillText(o.word || '', o.x, o.y - 5);
                if (o.lane === player.lane && typedBuffer) { ctx.fillStyle = NEON_BLUE; ctx.fillText(typedBuffer, o.x, o.y - 19); }
            } else if (gameMode === 'TRAINING') {
                ctx.fillStyle = "#1a4a6e"; ctx.beginPath(); ctx.roundRect(o.x-18, o.y, 36, 58, 5); ctx.fill();
                ctx.fillStyle = "rgba(255,255,255,0.55)"; ctx.font = "bold 9px Roboto Mono"; ctx.textAlign = "center";
                ctx.fillText("SPC", o.x, o.y + 34);
            } else {
                ctx.fillStyle = "#b33939"; ctx.beginPath(); ctx.roundRect(o.x-18, o.y, 36, 58, 5); ctx.fill();
                ctx.fillStyle = "white"; ctx.font = "bold 20px Roboto Mono"; ctx.textAlign = "center"; ctx.fillText(o.char, o.x, o.y + 38);
            }
        });
        if(player.isJumping) { ctx.shadowBlur = 15; ctx.shadowColor = NEON_BLUE; }
        ctx.fillStyle = NEON_BLUE; ctx.beginPath(); ctx.roundRect(player.x, player.y - player.jumpH, player.w, player.h, 6); ctx.fill(); ctx.shadowBlur = 0;
        bonuses.forEach(b => { ctx.globalAlpha = b.l; ctx.fillStyle = b.c; ctx.fillText(b.t, b.x, b.y); });
        ctx.globalAlpha = 1;
    }

    function loop(currentTime) {
        const dt = Math.min((currentTime - lastTime) / (1000 / 60), 2.0);
        lastTime = currentTime; update(dt); draw(); requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
</script>
</body>
</html>
