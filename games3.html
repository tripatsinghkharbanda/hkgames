<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prep Quest</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --secondary: #7000ff; --green: #00ff88; --red: #ff4b4b; --bg: #0f172a; --glass: rgba(255,255,255,0.08); }
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; overflow: hidden; }

        #game-container { position: relative; width: 100%; max-width: 900px; aspect-ratio: 9/5; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); }
        canvas { width: 100%; height: 100%; display: block; }
        .hidden { display: none !important; }

        /* HUD */
        #hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; padding: 7px 15px; background: var(--glass); border-radius: 12px; font-size: 0.8rem; font-weight: 700; z-index: 5; pointer-events: none; gap: 12px; }
        #hud .stat span { color: var(--primary); }
        #lives-display { color: #ff4b6e; letter-spacing: 2px; font-size: 0.95rem; }
        #timer-wrap { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
        #timer-label { font-size: 0.65rem; color: #94a3b8; white-space: nowrap; }
        #timer-bar-bg { flex: 1; max-width: 160px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        #timer-bar { height: 100%; border-radius: 4px; background: var(--primary); width: 100%; transition: background 0.3s; }
        #q-counter { font-size: 0.7rem; color: #94a3b8; white-space: nowrap; }

        /* Question zone */
        #question-zone { position: absolute; top: 55px; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 4; pointer-events: none; gap: 20px; padding: 10px 20px; }

        #sentence-wrap { background: rgba(15,23,42,0.85); border: 1.5px solid rgba(0,242,255,0.3); border-radius: 16px; padding: 14px 28px; max-width: 88%; text-align: center; }
        #sentence-text { font-size: clamp(0.8rem, 2.8vw, 1.15rem); font-weight: 600; line-height: 1.7; }
        #sentence-text .blank { color: var(--primary); font-size: 1.2em; font-weight: 900; letter-spacing: 3px; border-bottom: 2px solid var(--primary); }
        #sentence-text .filled { color: var(--green); font-weight: 900; }

        #choices { display: flex; gap: 12px; pointer-events: all; flex-wrap: wrap; justify-content: center; }
        .choice-card {
            position: relative; min-width: 100px; padding: 13px 22px; text-align: center;
            background: rgba(255,255,255,0.09); border: 2px solid rgba(255,255,255,0.18);
            border-radius: 14px; font-size: 1.05rem; font-weight: 700; cursor: pointer;
            transition: transform 0.12s, border-color 0.15s, background 0.15s;
            user-select: none; outline: none;
        }
        .choice-card:hover { border-color: var(--primary); background: rgba(0,242,255,0.12); transform: translateY(-3px); }
        .choice-card:active { transform: scale(0.95); }
        .choice-card .key-hint { position: absolute; top: 4px; right: 7px; font-size: 8px; color: rgba(255,255,255,0.3); font-weight: 400; }
        .choice-card.correct { border-color: var(--green) !important; background: rgba(0,255,136,0.18) !important; animation: pop 0.35s ease; }
        .choice-card.wrong   { border-color: var(--red) !important; background: rgba(255,75,75,0.18) !important; animation: shake 0.35s ease; }
        .choice-card.reveal  { border-color: var(--green) !important; background: rgba(0,255,136,0.1) !important; }
        .choice-card.dim     { opacity: 0.35; }

        #explain-panel {
            position: absolute; bottom: 4%; left: 4%; right: 4%;
            background: rgba(10,18,40,0.97); border: 1px solid rgba(255,160,0,0.4);
            border-radius: 14px; padding: 10px 16px 12px;
            z-index: 9; pointer-events: none;
            font-size: clamp(0.58rem, 1.7vw, 0.76rem); line-height: 1.65;
        }
        #explain-panel .ep-title { font-size: 0.68rem; color: #ff8800; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .ep-row { display: flex; gap: 6px; align-items: baseline; }
        .ep-tag { font-weight: 800; min-width: 64px; }
        .ep-tag.correct { color: #00ff88; }
        .ep-tag.wrong   { color: rgba(255,255,255,0.4); }
        .ep-why { color: rgba(255,255,255,0.55); }
        .ep-why.correct { color: #a3f0c6; }
        #next-btn { margin-top: 8px; float: right; background: linear-gradient(to right,#f97316,#facc15); color: #0f172a; border: none; border-radius: 20px; padding: 5px 16px; font-size: 0.72rem; font-weight: 800; cursor: pointer; pointer-events: all; font-family: 'Poppins', sans-serif; letter-spacing: 0.5px; }
        #next-btn:hover { filter: brightness(1.12); }

        @keyframes pop   { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.1); } }
        @keyframes shake { 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-7px); } 75%{ transform:translateX(7px); } }

        /* Feedback message */
        #feedback { position: absolute; top: 58%; left: 50%; transform: translateX(-50%); font-size: clamp(0.8rem,2.5vw,1rem); font-weight: 700; padding: 6px 18px; border-radius: 20px; z-index: 6; pointer-events: none; white-space: nowrap; }

        /* Score popup */
        .score-pop { position: absolute; font-size: 1.3rem; font-weight: 900; pointer-events: none; z-index: 7; animation: float-up 0.85s ease-out forwards; }
        @keyframes float-up { 0%{ opacity:1; transform:translateY(0) translateX(-50%); } 100%{ opacity:0; transform:translateY(-55px) translateX(-50%); } }

        /* Flash overlay */
        #flash { position: absolute; inset: 0; z-index: 8; pointer-events: none; opacity: 0; }

        /* Menus */
        .ui-layer { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15,23,42,0.96); backdrop-filter: blur(10px); z-index: 10; padding: 14px 22px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        h1 { font-size: clamp(1.5rem, 8vw, 2.8rem); margin-bottom: 0.3rem; background: linear-gradient(to right, var(--primary), #a855f7); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; text-align: center; }
        .sub { color: #94a3b8; text-align: center; margin-bottom: 0.9rem; font-size: 0.85rem; }
        .menu-option { padding: 12px 22px; margin: 6px; font-size: 15px; font-weight: 700; background: var(--glass); color: white; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; width: 90%; max-width: 360px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; outline: none; transition: border-color 0.2s, background 0.2s; }
        .menu-option:hover, .menu-option:focus { border-color: var(--primary); background: rgba(0,242,255,0.08); }
        .key-prompt { background: white; color: black; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .home-link { display: inline-block; margin-top: 16px; font-size: 0.72rem; font-weight: 600; letter-spacing: 1px; color: rgba(255,255,255,0.3); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
        .home-link:hover { color: rgba(255,255,255,0.7); }

        @media (max-width: 480px) {
            h1 { font-size: 1.3rem !important; }
            #sentence-text { font-size: 0.75rem; }
            .choice-card { min-width: 76px; padding: 10px 12px; font-size: 0.9rem; }
            #choices { gap: 7px; }
            .menu-option { padding: 8px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="900" height="500"></canvas>

    <div id="flash"></div>

    <!-- HUD -->
    <div id="hud" class="hidden">
        <div class="stat">SCORE: <span id="score-val">0</span></div>
        <div id="timer-wrap">
            <span id="timer-label">TIME</span>
            <div id="timer-bar-bg"><div id="timer-bar"></div></div>
        </div>
        <div id="q-counter">Q 1/12</div>
        <div id="lives-display">❤️❤️❤️</div>
    </div>

    <!-- Question + Choices -->
    <div id="question-zone" class="hidden">
        <div id="sentence-wrap">
            <div id="sentence-text"></div>
        </div>
        <div id="choices">
            <div class="choice-card" id="c0" tabindex="0"><span class="key-hint">1</span><span class="ct"></span></div>
            <div class="choice-card" id="c1" tabindex="0"><span class="key-hint">2</span><span class="ct"></span></div>
            <div class="choice-card" id="c2" tabindex="0"><span class="key-hint">3</span><span class="ct"></span></div>
        </div>
    </div>

    <div id="explain-panel" class="hidden">
        <div class="ep-title">📚 Why?</div>
        <div id="explain-content"></div>
        <div style="text-align:right;margin-top:7px;"><button id="next-btn" onclick="dismissExplanation()">Got it — Next →</button></div>
    </div>

    <div id="feedback" class="hidden"></div>

    <!-- Main Menu -->
    <div id="main-menu" class="ui-layer">
        <h1>Prep Quest</h1>
        <p class="sub">Grade 7 Prepositions — Fill in the blank correctly!</p>
        <div class="menu-option" tabindex="0" onclick="startGame('easy')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startGame('easy');}">
            <span>🟢 Easy &nbsp;(Place &amp; Time)</span><span class="key-prompt">1</span>
        </div>
        <div class="menu-option" tabindex="0" onclick="startGame('medium')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startGame('medium');}">
            <span>🟡 Medium (Direction &amp; Duration)</span><span class="key-prompt">2</span>
        </div>
        <div class="menu-option" tabindex="0" onclick="startGame('hard')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startGame('hard');}">
            <span>🔴 Hard &nbsp;(Mixed Advanced)</span><span class="key-prompt">3</span>
        </div>
        <a href="index.html" class="home-link">← Back to Arcade Hub</a>
    </div>

    <!-- Game Over -->
    <div id="game-over" class="ui-layer hidden">
        <h1 id="end-title" style="-webkit-text-fill-color:white;color:white;">GAME OVER</h1>
        <p id="final-score" class="sub">Score: 0</p>
        <p id="hs-note" style="color:#ffd700;font-size:0.85rem;font-weight:700;min-height:1.3em;margin:0;"></p>
        <div class="menu-option" tabindex="0" onclick="startGame(currentMode)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startGame(currentMode);}">
            <span>RETRY</span><span class="key-prompt">ENTER</span>
        </div>
        <div class="menu-option" tabindex="0" onclick="showMenu()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();showMenu();}">
            <span>MAIN MENU</span><span class="key-prompt">M</span>
        </div>
        <a href="index.html" class="home-link">← Back to Arcade Hub</a>
    </div>
</div>

<script>
    // ── Canvas ────────────────────────────────────────────────
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const stars = Array.from({length: 140}, () => ({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.6 + 0.3, sp: Math.random() * 0.35 + 0.15
    }));

    function drawBG() {
        const grd = ctx.createLinearGradient(0, 0, 0, H);
        grd.addColorStop(0, '#0f172a'); grd.addColorStop(1, '#1a0a2e');
        ctx.fillStyle = grd; ctx.fillRect(0, 0, W, H);
        stars.forEach(s => {
            s.x -= s.sp; if (s.x < 0) { s.x = W; s.y = Math.random() * H; }
            ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28);
            ctx.fillStyle = `rgba(255,255,255,${0.25 + s.r * 0.22})`; ctx.fill();
        });
    }

    // ── Explanations ─────────────────────────────────────────
    // Keys match question sentence; each option maps to a short reason.
    const EXPLAIN = {
        "The book is ___ the table.":              { on:"✓ 'on' — for surfaces (rests on top).",in:"✗ 'in' — enclosed spaces, not flat surfaces.",at:"✗ 'at' — for specific points, not surfaces." },
        "The cat is hiding ___ the box.":           { in:"✓ 'in' — inside an enclosed space.",on:"✗ 'on' — on top of a surface, not inside.",under:"✗ 'under' — below something, not inside it." },
        "She lives ___ London.":                   { in:"✓ 'in' — cities and countries use 'in'.",at:"✗ 'at' — for specific addresses, not whole cities.",on:"✗ 'on' — for surfaces or days, not cities." },
        "We met ___ the airport.":                 { at:"✓ 'at' — for specific meeting/arrival points.",in:"✗ 'in' — implies inside the building (less precise).",on:"✗ 'on' — for transport or surfaces, not buildings." },
        "He was born ___ 1990.":                   { in:"✓ 'in' — for years, months, and longer periods.",on:"✗ 'on' — for specific dates/days, not years.",at:"✗ 'at' — for times of day, not years." },
        "The match starts ___ 5 PM.":              { at:"✓ 'at' — for specific times of day.",in:"✗ 'in' — for general periods, not exact times.",on:"✗ 'on' — for days/dates, not clock times." },
        "School is closed ___ Sunday.":            { on:"✓ 'on' — for days of the week.",at:"✗ 'at' — for times, not days of the week.",in:"✗ 'in' — for months/years, not days." },
        "She works ___ a hospital.":               { in:"✓ 'in' — working inside a large institution.",at:"✗ 'at' — location point (less specific than 'in').",on:"✗ 'on' — for transport/surfaces, not workplaces." },
        "He arrived ___ Monday morning.":          { on:"✓ 'on' — for days (including day + time-of-day).",at:"✗ 'at' — for times, not days of the week.",in:"✗ 'in' — for months/years, not specific days." },
        "The dog is sleeping ___ the floor.":      { on:"✓ 'on' — resting on a surface.",in:"✗ 'in' — enclosed spaces, not flat surfaces.",at:"✗ 'at' — a specific point/location, not a surface." },
        "They arrived ___ the station.":           { at:"✓ 'at' — a specific destination/arrival point.",in:"✗ 'in' — inside the building (less precise).",on:"✗ 'on' — for transport/surfaces, not buildings." },
        "We will meet ___ noon.":                  { at:"✓ 'at' — for precise times (noon, midnight, etc.).",in:"✗ 'in' — for time periods (morning/afternoon), not exact times.",on:"✗ 'on' — for days, not specific clock times." },
        "The picture is hanging ___ the wall.":    { on:"✓ 'on' — objects attached to or resting on a surface.",in:"✗ 'in' — enclosed spaces, not flat surfaces.",at:"✗ 'at' — a specific point; walls are surfaces." },
        "She sat ___ the front row.":              { in:"✓ 'in' — for rows and organised groups.",at:"✗ 'at' — for a single seat/point, not a whole row.",on:"✗ 'on' — for surfaces, not rows." },
        "He is standing ___ the door.":            { at:"✓ 'at' — at a specific position/point.",in:"✗ 'in' — inside a room, not at its entrance.",on:"✗ 'on' — for surfaces, not doorways." },
        "She walked ___ the bridge.":              { across:"✓ 'across' — from one side to the other of a surface.",through:"✗ 'through' — entering/exiting an enclosed space.",over:"✗ 'over' — above something without touching it." },
        "The train goes ___ the tunnel.":          { through:"✓ 'through' — inside and all along an enclosed passage.",across:"✗ 'across' — side-to-side on open surface, not enclosed.",over:"✗ 'over' — above something; trains go inside tunnels." },
        "He jumped ___ the fence.":                { over:"✓ 'over' — above and past an obstacle.",through:"✗ 'through' — entering/exiting (e.g. a gap); fences are solid.",across:"✗ 'across' — side-to-side motion, not upward." },
        "She has studied here ___ two years.":     { for:"✓ 'for' + duration (a length of time).",since:"✗ 'since' + starting point, not a duration.",during:"✗ 'during' + a named period, not a bare number." },
        "They have been friends ___ childhood.":   { since:"✓ 'since' — from a past point/event up to now.",for:"✗ 'for' — a duration of time, not a starting point.",during:"✗ 'during' — within a period, not from its start to now." },
        "He fell asleep ___ the lecture.":         { during:"✓ 'during' — at some point within a named event.",for:"✗ 'for' — a length of time, not within a named event.",since:"✗ 'since' — from a past point, not within an event." },
        "The bird flew ___ the open window.":      { through:"✓ 'through' — entering one side and exiting the other.",across:"✗ 'across' — side-to-side, not via a narrow opening.",into:"✗ 'into' — entering only; 'through' implies exiting too." },
        "She drove ___ the countryside.":          { through:"✓ 'through' — travelling within/inside an area.",across:"✗ 'across' — edge to edge; 'through' shows being inside.",around:"✗ 'around' — circling it, not passing through." },
        "They sailed ___ the lake.":               { across:"✓ 'across' — from one bank/shore to the opposite.",around:"✗ 'around' — circling the lake, not crossing it.",through:"✗ 'through' — for enclosed spaces; lakes are open water." },
        "He has lived here ___ 2015.":             { since:"✓ 'since' — from a specific year to now.",for:"✗ 'for' — a duration (e.g. for 8 years), not a year.",during:"✗ 'during' — within a named period, not from a start year." },
        "She has been waiting ___ an hour.":       { for:"✓ 'for' — how long (a duration of time).",since:"✗ 'since' — a starting point, not a length of time.",during:"✗ 'during' — within a named event, not a bare duration." },
        "The soldiers marched ___ the bridge.":    { across:"✓ 'across' — from one side to the other of a surface.",through:"✗ 'through' — for enclosed spaces; bridges are open.",over:"✗ 'over' — above; marching is on the bridge surface." },
        "He swam ___ the river to the other side.":{ across:"✓ 'across' — from one bank to the opposite bank.",through:"✗ 'through' — for enclosed spaces, not open-water crossings.",over:"✗ 'over' — above a surface; swimming is in the water." },
        "She peeked ___ a gap in the curtain.":    { through:"✓ 'through' — looking via an opening from one side to the other.",into:"✗ 'into' — entering a space; she is only looking, not entering.",across:"✗ 'across' — side-to-side on a surface, not via a gap." },
        "They didn't speak ___ the movie.":        { during:"✓ 'during' — within the time of a named event.",for:"✗ 'for' — a duration; 'during the movie' is idiomatic.",since:"✗ 'since' — from a past point, not within an event." },
        "The painting hangs ___ the fireplace.":   { above:"✓ 'above' — higher than, without directly covering it.",over:"✗ 'over' — directly covering or spanning; 'above' is more precise here.",beside:"✗ 'beside' — next to (same level), not higher up." },
        "She sat ___ her two friends.":            { between:"✓ 'between' — in the middle of exactly two people.",among:"✗ 'among' — used with three or more people.",beside:"✗ 'beside' — next to one person, not in the middle of two." },
        "The secret was shared ___ all of them.":  { among:"✓ 'among' — shared within a group of three or more.",between:"✗ 'between' — for exactly two; 'all of them' is a larger group.",within:"✗ 'within' — inside limits/boundaries, not shared in a group." },
        "He acted ___ thinking twice.":            { without:"✓ 'without' — in the complete absence of something.",despite:"✗ 'despite' — in spite of (contrast), not absence.",against:"✗ 'against' — in opposition to, not the absence of." },
        "They won ___ all the odds.":              { against:"✓ 'against' — in direct opposition to unfavourable odds.",despite:"✗ 'despite' — needs 'despite all odds' (noun phrase) which is also valid, but 'against all odds' is the fixed idiom.",without:"✗ 'without' — absence of something, not opposition." },
        "She succeeded ___ all difficulties.":     { despite:"✓ 'despite' — she succeeded even though difficulties existed.",without:"✗ 'without' — would mean no difficulties existed (opposite meaning!).",against:"✗ 'against' — in opposition; 'despite' is correct for overcoming." },
        "He spoke ___ great confidence.":          { with:"✓ 'with' — shows accompanying quality or manner.",in:"✗ 'in' — for language/voice tone ('in a loud voice'), not confidence.",by:"✗ 'by' — means or agent, not an accompanying manner." },
        "The results will be known ___ a week.":   { within:"✓ 'within' — at some point before the end of the period.",in:"✗ 'in' — exactly at the end of the period, not any time before.",after:"✗ 'after' — following the period, not during it." },
        "They walked ___ the old river road.":     { along:"✓ 'along' — following the length/direction of a path.",beside:"✗ 'beside' — next to it, not moving in its direction.",through:"✗ 'through' — for enclosed spaces, not open roads." },
        "She is standing just ___ the door.":      { behind:"✓ 'behind' — at the back of something.",beside:"✗ 'beside' — side by side, not at the back.",near:"✗ 'near' — vague proximity; 'just behind' is more specific." },
        "He completed the task ___ the deadline.":  { before:"✓ 'before' — earlier than the deadline.",after:"✗ 'after' — later than the deadline (opposite meaning!).",within:"✗ 'within' — inside a period; 'within a deadline' is non-standard." },
        "The note was written ___ a blue pen.":    { with:"✓ 'with' — the instrument or tool used.",by:"✗ 'by' — the person who wrote it, not the tool.",in:"✗ 'in' — for colour of ink ('written in blue') not the pen itself." },
        "She replied ___ a warm smile.":           { with:"✓ 'with' — an accompanying expression or manner.",by:"✗ 'by' — method/means, not an accompanying expression.",in:"✗ 'in' — for language or voice tone, not physical expressions." },
        "He was punished ___ his mistake.":        { for:"✓ 'for' — the reason or cause of the punishment.",because:"✗ 'because' — a conjunction needing a full clause after it.","due to":"✗ 'due to' — causal but 'punished for' is the standard collocation." },
        "They disagreed ___ each other.":          { with:"✓ 'disagree with' is the fixed verb-preposition collocation.",against:"✗ 'against' — general opposition; 'disagree with' is the idiom.",between:"✗ 'between' — shows position or relationship, not disagreement." },
        // ── 50 new questions ──────────────────────────────────
        "The cat sat ___ the mat.":                    {on:"✓ 'on' — for surfaces (resting on top).",in:"✗ 'in' — enclosed spaces, not flat surfaces.",at:"✗ 'at' — a specific point, not a surface."},
        "He put the letter ___ the envelope.":          {in:"✓ 'in' — inside an enclosed container.",on:"✗ 'on' — for surfaces, not inside containers.",at:"✗ 'at' — a specific point, not inside something."},
        "She is waiting ___ the bus stop.":             {at:"✓ 'at' — for a specific waiting/meeting point.",on:"✗ 'on' — for transport or surfaces, not stops.",in:"✗ 'in' — enclosed spaces; a bus stop is an open point."},
        "The shop is closed ___ Christmas Day.":        {on:"✓ 'on' — for specific named days.",at:"✗ 'at' — for times of day, not named days.",in:"✗ 'in' — for months or years, not specific days."},

            bar.style.width = (pct * 100) + '%';
            bar.style.background = pct > 0.5 ? '#00f2ff' : pct > 0.25 ? '#ff8800' : '#ff4b4b';
            if (pct <= 0) { onTimeout(); return; }
            timerRAF = requestAnimationFrame(tick);
        }
        timerRAF = requestAnimationFrame(tick);
    }

    function onTimeout() {
        if (answered) return;
        answered = true; streak = 0;
        playWrong(); flashScreen('rgba(255,75,75,0.4)');
        showFeedback('⏰ Time\'s up!  →  ' + currentQ.a, '#ff8800');
        for (let i = 0; i < 3; i++) {
            const c = document.getElementById('c' + i);
            c.classList.add(opts[i] === currentQ.a ? 'reveal' : 'dim');
            c.style.pointerEvents = 'none';
        }
        showExplanation();
        lives--; document.getElementById('lives-display').innerHTML = livesHTML(lives);
        pendingNext = lives <= 0 ? () => endGame(false) : nextQuestion;
    }

    // ── Question Loading ──────────────────────────────────────
    function loadQuestion() {
        if (qIndex >= qList.length) { endGame(true); return; }
        currentQ = qList[qIndex]; answered = false;
        opts = shuffle([currentQ.a, ...currentQ.w]);
        document.getElementById('sentence-text').innerHTML = currentQ.s.replace('___', '<span class="blank">___</span>');
        opts.forEach((opt, i) => {
            const c = document.getElementById('c' + i);
            c.querySelector('.ct').textContent = opt;
            c.className = 'choice-card'; c.style.opacity = '1'; c.style.pointerEvents = 'all';
        });
        document.getElementById('q-counter').textContent = `Q ${qIndex + 1}/${qList.length}`;
        document.getElementById('explain-panel').classList.add('hidden');
        pendingNext = null;
        timerDuration = Math.max(5000, (currentMode === 'easy' ? 14000 : currentMode === 'medium' ? 11000 : 9000) - qIndex * 150);
        startTimer();
    }

    // ── Answer Handling ───────────────────────────────────────
    function choose(idx) {
        if (answered || gameState !== 'PLAYING') return;
        answered = true;
        cancelAnimationFrame(timerRAF);
        const chosen = opts[idx];
        for (let i = 0; i < 3; i++) document.getElementById('c' + i).style.pointerEvents = 'none';
        const card = document.getElementById('c' + idx);
        if (chosen === currentQ.a) {
            card.classList.add('correct');
            streak++;
            const pct = Math.max(0, 1 - (performance.now() - timerStart) / timerDuration);
            const bonus = Math.round(pct * 50) + (streak >= 3 ? 20 : 0);
            score += 100 + bonus;
            document.getElementById('score-val').textContent = score;
            flashScreen('rgba(0,255,136,0.3)');
            const msg = streak >= 3 ? `🔥 ×${streak} Streak!  +${100+bonus}` : `✓ Correct!  +${100+bonus}`;
            showFeedback(msg, '#00ff88');
            spawnPop('+' + (100 + bonus), '#00ff88');
            playCorrect();
            document.getElementById('sentence-text').innerHTML = currentQ.s.replace('___', `<span class="filled">${currentQ.a}</span>`);
            setTimeout(nextQuestion, 750);
        } else {
            card.classList.add('wrong');
            for (let i = 0; i < 3; i++) if (opts[i] === currentQ.a) document.getElementById('c' + i).classList.add('reveal');
            streak = 0; lives--;
            document.getElementById('lives-display').innerHTML = livesHTML(lives);
            flashScreen('rgba(255,75,75,0.4)');
            showFeedback('✗ Wrong!  Answer: ' + currentQ.a, '#ff6b6b');
            playWrong();
            showExplanation();
            pendingNext = lives <= 0 ? () => endGame(false) : nextQuestion;
        }
    }

    function nextQuestion() { qIndex++; loadQuestion(); }

    // ── Game Control ──────────────────────────────────────────
    function startGame(mode) {
        currentMode = mode; score = 0; lives = 3; qIndex = 0; streak = 0; answered = false;
        qList = shuffle(QUESTIONS[mode]);
        document.getElementById('score-val').textContent = '0';
        document.getElementById('lives-display').innerHTML = livesHTML(3);
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('question-zone').classList.remove('hidden');
        document.getElementById('feedback').classList.add('hidden');
        gameState = 'PLAYING';
        loadQuestion();
    }

    function endGame(won) {
        cancelAnimationFrame(timerRAF);
        gameState = 'OVER';
        document.getElementById('question-zone').classList.add('hidden');
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('feedback').classList.add('hidden');
        const hsKey = 'prepQuestHS_' + currentMode;
        const hs = parseInt(localStorage.getItem(hsKey) || '0');
        const newHS = score > hs;
        if (newHS) localStorage.setItem(hsKey, score);
        document.getElementById('end-title').textContent = won ? 'COMPLETE! 🎉' : 'GAME OVER';
        document.getElementById('final-score').textContent = won
            ? `All ${qList.length} questions done!  Score: ${score}`
            : `Score: ${score}  (Q ${qIndex}/${qList.length} answered)`;
        document.getElementById('hs-note').textContent = newHS ? '🏆 NEW HIGH SCORE!' : 'Best: ' + hs;
        document.getElementById('game-over').classList.remove('hidden');
        if (won) { setTimeout(playApplause, 300); }
        else { playCrash(); if (newHS) setTimeout(playApplause, 500); }
    }

    function showMenu() {
        cancelAnimationFrame(timerRAF);
        gameState = 'MENU';
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('question-zone').classList.add('hidden');
        document.getElementById('feedback').classList.add('hidden');
    }

    // ── Input ─────────────────────────────────────────────────
    for (let i = 0; i < 3; i++) {
        const c = document.getElementById('c' + i);
        c.addEventListener('click', () => choose(i));
        c.addEventListener('touchstart', (e) => { e.preventDefault(); choose(i); }, { passive: false });
        c.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(i); } });
    }

    window.addEventListener('keydown', (e) => {
        if (gameState === 'MENU') {
            if (e.key === '1') startGame('easy');
            if (e.key === '2') startGame('medium');
            if (e.key === '3') startGame('hard');
        } else if (gameState === 'PLAYING') {
            if (answered && pendingNext && (e.key === ' ' || e.key === 'Enter')) { e.preventDefault(); dismissExplanation(); return; }
            if (e.key === '1') choose(0);
            if (e.key === '2') choose(1);
            if (e.key === '3') choose(2);
        } else if (gameState === 'OVER') {
            if (e.code === 'Enter') startGame(currentMode);
            if (e.key.toUpperCase() === 'M') showMenu();
        }
    });

    // ── Render Loop ───────────────────────────────────────────
    (function loop() { drawBG(); requestAnimationFrame(loop); })();
</script>
</body>
</html>
