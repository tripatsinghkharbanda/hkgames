<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tense Quest</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #facc15; --secondary: #f97316; --green: #00ff88; --red: #ff4b4b; --bg: #0f172a; --glass: rgba(255,255,255,0.08); }
        * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 900px; aspect-ratio: 9/5; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); }
        canvas { width: 100%; height: 100%; display: block; }
        .hidden { display: none !important; }
        #hud { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; align-items: center; padding: 7px 15px; background: var(--glass); border-radius: 12px; font-size: 0.8rem; font-weight: 700; z-index: 5; pointer-events: none; gap: 12px; }
        #hud .stat span { color: var(--primary); }
        #lives-display { color: #ff4b6e; letter-spacing: 2px; font-size: 0.95rem; }
        #timer-wrap { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
        #timer-label { font-size: 0.65rem; color: #94a3b8; white-space: nowrap; }
        #timer-bar-bg { flex: 1; max-width: 160px; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        #timer-bar { height: 100%; border-radius: 4px; background: var(--primary); width: 100%; transition: background 0.3s; }
        #q-counter { font-size: 0.7rem; color: #94a3b8; white-space: nowrap; }
        #question-zone { position: absolute; top: 55px; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 4; pointer-events: none; gap: 20px; padding: 10px 20px; }
        #sentence-wrap { background: rgba(15,23,42,0.85); border: 1.5px solid rgba(250,204,21,0.35); border-radius: 16px; padding: 14px 28px; max-width: 90%; text-align: center; }
        #sentence-text { font-size: clamp(0.78rem, 2.6vw, 1.1rem); font-weight: 600; line-height: 1.7; }
        #sentence-text .blank { color: var(--primary); font-size: 1.2em; font-weight: 900; letter-spacing: 3px; border-bottom: 2px solid var(--primary); }
        #sentence-text .filled { color: var(--green); font-weight: 900; }
        #choices { display: flex; gap: 10px; pointer-events: all; flex-wrap: wrap; justify-content: center; }
        .choice-card { position: relative; min-width: 110px; padding: 12px 16px; text-align: center; background: rgba(255,255,255,0.09); border: 2px solid rgba(255,255,255,0.18); border-radius: 14px; font-size: clamp(0.78rem,2.2vw,0.98rem); font-weight: 700; cursor: pointer; transition: transform 0.12s, border-color 0.15s, background 0.15s; user-select: none; outline: none; }
        .choice-card:hover { border-color: var(--primary); background: rgba(250,204,21,0.12); transform: translateY(-3px); }
        .choice-card:active { transform: scale(0.95); }
        .choice-card .key-hint { position: absolute; top: 4px; right: 7px; font-size: 8px; color: rgba(255,255,255,0.3); font-weight: 400; }
        .choice-card.correct { border-color: var(--green) !important; background: rgba(0,255,136,0.18) !important; animation: pop 0.35s ease; }
        .choice-card.wrong   { border-color: var(--red) !important; background: rgba(255,75,75,0.18) !important; animation: shake 0.35s ease; }
        .choice-card.reveal  { border-color: var(--green) !important; background: rgba(0,255,136,0.1) !important; }
        .choice-card.dim     { opacity: 0.35; }
        #explain-panel { position: absolute; bottom: 4%; left: 4%; right: 4%; background: rgba(10,18,40,0.97); border: 1px solid rgba(250,204,21,0.35); border-radius: 14px; padding: 10px 16px 12px; z-index: 9; pointer-events: none; font-size: clamp(0.55rem, 1.55vw, 0.72rem); line-height: 1.65; }
        #explain-panel .ep-title { font-size: 0.67rem; color: var(--primary); font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        .ep-row { display: flex; gap: 6px; align-items: baseline; }
        .ep-tag { font-weight: 800; min-width: 96px; flex-shrink: 0; }
        .ep-tag.correct { color: #00ff88; }
        .ep-tag.wrong   { color: rgba(255,255,255,0.4); }
        .ep-why { color: rgba(255,255,255,0.55); }
        .ep-why.correct { color: #a3f0c6; }
        @keyframes pop   { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.1); } }
        @keyframes shake { 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-7px); } 75%{ transform:translateX(7px); } }
        #feedback { position: absolute; top: 58%; left: 50%; transform: translateX(-50%); font-size: clamp(0.8rem,2.5vw,1rem); font-weight: 700; padding: 6px 18px; border-radius: 20px; z-index: 6; pointer-events: none; white-space: nowrap; }
        .score-pop { position: absolute; font-size: 1.3rem; font-weight: 900; pointer-events: none; z-index: 7; animation: float-up 0.85s ease-out forwards; }
        @keyframes float-up { 0%{ opacity:1; transform:translateY(0) translateX(-50%); } 100%{ opacity:0; transform:translateY(-55px) translateX(-50%); } }
        #flash { position: absolute; inset: 0; z-index: 8; pointer-events: none; opacity: 0; }
        .ui-layer { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(15,23,42,0.96); backdrop-filter: blur(10px); z-index: 10; padding: 14px 22px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        h1 { font-size: clamp(1.5rem, 8vw, 2.8rem); margin-bottom: 0.3rem; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; text-align: center; }
        .sub { color: #94a3b8; text-align: center; margin-bottom: 0.9rem; font-size: 0.85rem; }
        .menu-option { padding: 12px 22px; margin: 6px; font-size: 15px; font-weight: 700; background: var(--glass); color: white; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; width: 90%; max-width: 390px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; outline: none; transition: border-color 0.2s, background 0.2s; }
        .menu-option:hover, .menu-option:focus { border-color: var(--primary); background: rgba(250,204,21,0.08); }
        .key-prompt { background: white; color: black; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .home-link { display: inline-block; margin-top: 16px; font-size: 0.72rem; font-weight: 600; letter-spacing: 1px; color: rgba(255,255,255,0.3); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
        .home-link:hover { color: rgba(255,255,255,0.7); }
        @media (max-width: 480px) {
            h1 { font-size: 1.3rem !important; }
            #sentence-text { font-size: 0.73rem; }
            .choice-card { min-width: 88px; padding: 9px 8px; font-size: 0.78rem; }
            #choices { gap: 6px; }
            .menu-option { padding: 8px 14px; font-size: 13px; }
        }
    </style>
</head>
<body>
<div id="game-container">
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    <div id="flash"></div>
    <div id="hud" class="hidden">
        <div class="stat">SCORE: <span id="score-val">0</span></div>
        <div id="timer-wrap"><span id="timer-label">TIME</span><div id="timer-bar-bg"><div id="timer-bar"></div></div></div>
        <div id="q-counter">Q 1/15</div>
        <div id="lives-display">❤️❤️❤️</div>
    </div>
    <div id="question-zone" class="hidden">
        <div id="sentence-wrap"><div id="sentence-text"></div></div>
        <div id="choices">
            <div class="choice-card" id="c0" tabindex="0"><span class="key-hint">1</span><span class="ct"></span></div>
            <div class="choice-card" id="c1" tabindex="0"><span class="key-hint">2</span><span class="ct"></span></div>
            <div class="choice-card" id="c2" tabindex="0"><span class="key-hint">3</span><span class="ct"></span></div>
        </div>
    </div>
    <div id="explain-panel" class="hidden">
        <div class="ep-title">📚 Why?</div>
        <div id="explain-content"></div>
    </div>
    <div id="feedback" class="hidden"></div>
    <div id="main-menu" class="ui-layer">
        <h1>Tense Quest</h1>
        <p class="sub">Grade 7 Perfect Tenses — Choose the correct form!</p>
        <div class="menu-option" tabindex="0" onclick="startGame('easy')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startGame('easy');}">
            <span>🟢 Easy &nbsp;(have / has / had)</span><span class="key-prompt">1</span>
        </div>
        <div class="menu-option" tabindex="0" onclick="startGame('medium')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startGame('medium');}">
            <span>🟡 Medium (Past Participles)</span><span class="key-prompt">2</span>
        </div>
        <div class="menu-option" tabindex="0" onclick="startGame('hard')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startGame('hard');}">
            <span>🔴 Hard &nbsp;(Present vs Past Perfect)</span><span class="key-prompt">3</span>
        </div>
        <a href="index.html" class="home-link">← Back to Arcade Hub</a>
    </div>
    <div id="game-over" class="ui-layer hidden">
        <h1 id="end-title" style="-webkit-text-fill-color:white;color:white;">GAME OVER</h1>
        <p id="final-score" class="sub">Score: 0</p>
        <p id="hs-note" style="color:#ffd700;font-size:0.85rem;font-weight:700;min-height:1.3em;margin:0;"></p>
        <div class="menu-option" tabindex="0" onclick="startGame(currentMode)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startGame(currentMode);}">
            <span>RETRY</span><span class="key-prompt">ENTER</span>
        </div>
        <div class="menu-option" tabindex="0" onclick="showMenu()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();showMenu();}">
            <span>MAIN MENU</span><span class="key-prompt">M</span>
        </div>
        <a href="index.html" class="home-link">← Back to Arcade Hub</a>
    </div>
</div>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const stars = Array.from({length: 140}, () => ({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.6+0.3, sp: Math.random()*0.35+0.15
    }));
    function drawBG() {
        const g = ctx.createLinearGradient(0,0,0,H);
        g.addColorStop(0,'#0f172a'); g.addColorStop(1,'#1a1205');
        ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        stars.forEach(s => {
            s.x-=s.sp; if(s.x<0){s.x=W;s.y=Math.random()*H;}
            ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.28);
            ctx.fillStyle=`rgba(255,245,200,${0.22+s.r*0.2})`; ctx.fill();
        });
    }

    // ── Explanations ──────────────────────────────────────────
    const EXPLAIN = {
        // EASY — choosing have / has / had
        "She ___ just finished her homework.":           {has:"✓ 'has' — present perfect; she = 3rd person singular.",have:"✗ 'have' — for I/you/we/they, not she/he/it.",had:"✗ 'had' — past perfect; needs a past reference event."},
        "They ___ never visited Paris.":                 {have:"✓ 'have' — present perfect; they = plural.",has:"✗ 'has' — for he/she/it, not they.",had:"✗ 'had' — past perfect; no past reference event here."},
        "He ___ already eaten lunch.":                   {has:"✓ 'has' — present perfect; he = 3rd person singular.",have:"✗ 'have' — for I/you/we/they, not he.",had:"✗ 'had' — past perfect; 'already eaten' here is a present situation."},
        "I ___ lived here for five years.":              {have:"✓ 'have' — present perfect; I = 1st person.",has:"✗ 'has' — for 3rd person singular, not I.",had:"✗ 'had' — past perfect; 'for five years' up to now = present perfect."},
        "By the time we arrived, she ___ left.":         {had:"✓ 'had' — past perfect; she left before we arrived.",have:"✗ 'have' — present perfect; 'by the time we arrived' is past context.",has:"✗ 'has' — present perfect 3rd person; past context requires 'had'."},
        "We ___ not seen that film yet.":                {have:"✓ 'have' — present perfect; we = plural.",has:"✗ 'has' — for he/she/it, not we.",had:"✗ 'had' — past perfect; no past reference event is mentioned."},
        "He ___ worked here since 2019.":               {has:"✓ 'has' — present perfect; from 2019 to now (he = singular).",have:"✗ 'have' — for I/you/we/they, not he.",had:"✗ 'had' — past perfect; 'since 2019' to now = present perfect."},
        "Before the test, she ___ studied all night.":   {had:"✓ 'had' — past perfect; studying was before the test.",have:"✗ 'have' — wrong person and wrong tense here.",has:"✗ 'has' — present perfect; the test is a past reference = need 'had'."},
        "I ___ never seen snow before.":                 {have:"✓ 'have' — present perfect life experience; I = 1st person.",has:"✗ 'has' — for he/she/it, not I.",had:"✗ 'had' — past perfect; no past reference event here."},
        "The team ___ won every match this season.":     {has:"✓ 'has' — the team = collective singular noun.",have:"✗ 'have' — for plurals; 'team' is singular in standard usage.",had:"✗ 'had' — past perfect; 'this season' is the current period = present perfect."},
        "We ___ already told them the news.":            {have:"✓ 'have' — present perfect; we = plural.",has:"✗ 'has' — for he/she/it, not we.",had:"✗ 'had' — past perfect; no earlier past event referenced."},
        "She ___ just arrived at the station.":          {has:"✓ 'has' — present perfect; she = 3rd person singular.",have:"✗ 'have' — for I/you/we/they, not she.",had:"✗ 'had' — past perfect; 'just arrived' with present relevance = present perfect."},
        "The students ___ submitted their work.":        {have:"✓ 'have' — students = plural subject.",has:"✗ 'has' — for singular; 'students' is plural.",had:"✗ 'had' — past perfect; no earlier past event mentioned."},
        "He ___ completed the task before the deadline.":{had:"✓ 'had' — past perfect; completed before a past deadline.",have:"✗ 'have' — wrong person and wrong tense.",has:"✗ 'has' — present perfect; 'before the deadline' signals past perfect."},
        "My parents ___ lived in this city for 20 years.":{have:"✓ 'have' — parents = plural subject.",has:"✗ 'has' — for singular subjects; parents is plural.",had:"✗ 'had' — past perfect; 'for 20 years' up to now = present perfect."},
        // MEDIUM — choosing correct past participle
        "She has ___ to school by bus today.":           {gone:"✓ 'gone' — past participle of 'go' (go→went→gone).",went:"✗ 'went' — simple past; past participle 'gone' is needed after 'has'.",goed:"✗ 'goed' — not a real word; 'go' is an irregular verb."},
        "They have ___ the match against their rivals.": {won:"✓ 'won' — past participle of 'win' (win→won→won).",win:"✗ 'win' — base form; past participle required after 'have'.",winned:"✗ 'winned' — not a real word; 'win' is irregular and does not add -ed."},
        "He has ___ his textbook at home.":              {left:"✓ 'left' — past participle of 'leave' (leave→left→left).",leave:"✗ 'leave' — base form; past participle 'left' is needed after 'has'.",leaved:"✗ 'leaved' — not standard; 'leave' is irregular."},
        "I have ___ this movie three times.":            {seen:"✓ 'seen' — past participle of 'see' (see→saw→seen).",saw:"✗ 'saw' — simple past; 'seen' (past participle) is needed after 'have'.",seed:"✗ 'seed' — not a past participle of 'see'; 'seen' is correct."},
        "She has ___ a poem for the competition.":       {written:"✓ 'written' — past participle of 'write' (write→wrote→written).",wrote:"✗ 'wrote' — simple past; 'written' is the past participle needed after 'has'.",writed:"✗ 'writed' — not a real word; 'write' is irregular."},
        "We have ___ lunch already.":                    {eaten:"✓ 'eaten' — past participle of 'eat' (eat→ate→eaten).",ate:"✗ 'ate' — simple past; 'eaten' is the past participle needed after 'have'.",eated:"✗ 'eated' — not a real word; 'eat' is irregular."},
        "He had ___ the answer before she explained.":   {known:"✓ 'known' — past participle of 'know' (know→knew→known).",knew:"✗ 'knew' — simple past; 'known' (past participle) is required after 'had'.",knowed:"✗ 'knowed' — not a real word; 'know' is irregular."},
        "She has ___ her phone somewhere.":              {lost:"✓ 'lost' — past participle of 'lose' (lose→lost→lost).",lose:"✗ 'lose' — base form; past participle 'lost' is needed after 'has'.",losed:"✗ 'losed' — not a real word; 'lose' is irregular."},
        "They have ___ their homework before dinner.":   {done:"✓ 'done' — past participle of 'do' (do→did→done).",did:"✗ 'did' — simple past; 'done' (past participle) is needed after 'have'.",doing:"✗ 'doing' — present participle; not used with 'have' in perfect tenses."},
        "He has ___ to Paris twice for work.":           {been:"✓ 'been' — past participle used here: 'has been to' = visited and returned.",went:"✗ 'went' — simple past; 'been' is the past participle required after 'has'.",going:"✗ 'going' — present participle; not used with 'has' in the perfect tense."},
        "I have ___ hard for this exam.":                {studied:"✓ 'studied' — past participle of 'study' (regular: add -ied).",study:"✗ 'study' — base form; past participle 'studied' is needed after 'have'.",studying:"✗ 'studying' — present participle; not used with 'have' in perfect tenses."},
        "She had ___ the book before the film came out.":{read:"✓ 'read' — past participle of 'read' (same spelling, different pronunciation: /rɛd/).",readed:"✗ 'readed' — not a real word; 'read' is irregular.",reading:"✗ 'reading' — present participle; past participle 'read' is needed after 'had'."},
        "They have ___ their bags and are ready.":       {packed:"✓ 'packed' — past participle of 'pack' (regular: pack→packed).",pack:"✗ 'pack' — base form; past participle 'packed' is needed after 'have'.",packing:"✗ 'packing' — present participle; not used with 'have' in perfect tenses."},
        "He has ___ his bicycle to school.":             {ridden:"✓ 'ridden' — past participle of 'ride' (ride→rode→ridden).",rode:"✗ 'rode' — simple past; 'ridden' is the past participle needed after 'has'.",rided:"✗ 'rided' — not a real word; 'ride' is irregular."},
        "She has ___ in this city since she was born.":  {lived:"✓ 'lived' — past participle of 'live' (regular: live→lived).",live:"✗ 'live' — base form; past participle 'lived' is needed after 'has'.",living:"✗ 'living' — present participle; not used with 'has' in perfect tenses."},
        // HARD — present perfect vs past perfect
        "I ___ my keys — can you help me?":              {"have lost":"✓ Present perfect: the loss is relevant NOW (I need help now).","had lost":"✗ Past perfect: needs a past reference event; none exists here.","lost":"✗ Simple past: 'can you help me' shows present consequence → present perfect."},
        "Before he spoke, she ___ the answer.":          {"had guessed":"✓ Past perfect: her guessing was completed BEFORE he spoke.","has guessed":"✗ Present perfect: the sentence is past context — needs past perfect.","guessed":"✗ Simple past: 'before he spoke' signals the guessing came first → past perfect."},
        "___ you ever seen the Northern Lights?":        {"Have":"✓ 'Have' — present perfect for life experience ('Have you ever…?').","Had":"✗ 'Had' — past perfect question; needs a past event ('Had you seen it before X?').","Did":"✗ 'Did' — simple past; 'ever' questions use present perfect, not simple past."},
        "He told me he ___ the project.":               {"had finished":"✓ Past perfect: finishing happened BEFORE 'told' (another past event).","has finished":"✗ Present perfect: 'told' is past, so the earlier event needs past perfect.","finished":"✗ Simple past: in past reported speech, the verb backshifts to past perfect."},
        "She ___ three films this month.":               {"has watched":"✓ Present perfect: 'this month' is a current, unfinished period.","had watched":"✗ Past perfect: no past reference point given.","watched":"✗ Simple past: 'this month' is ongoing → present perfect is required."},
        "By noon, they ___ 10 km already.":              {"had walked":"✓ Past perfect: completed BEFORE noon (a past time marker).","have walked":"✗ Present perfect: 'by noon' is a past deadline → past perfect needed.","walked":"✗ Simple past: 'by noon' + 'already' = pre-past completion → past perfect."},
        "I recognised her because we ___ before.":       {"had met":"✓ Past perfect: the meeting happened BEFORE I recognised her.","have met":"✗ Present perfect: 'recognised' is past, so the earlier event needs past perfect.","met":"✗ Simple past: 'because' explains a prior event → past perfect is correct."},
        "She ___ just sent you a message.":              {"has just sent":"✓ Present perfect with 'just' = very recent action with present relevance.","had just sent":"✗ Past perfect: needs a later past event to refer to.","just sent":"✗ Informal shortening; grammatically 'has just sent' is the standard form."},
        "They ___ in Dubai for three years now.":        {"have lived":"✓ Present perfect: from the past until now (still living there).","had lived":"✗ Past perfect: 'now' confirms the action extends to the present.","lived":"✗ Simple past: 'for three years now' shows the action is still ongoing."},
        "He ___ never tried sushi before that trip.":    {"had":"✓ 'had' — past perfect: he had not tried it before a past event (the trip).","has":"✗ 'has' — present perfect; 'before that trip' is a past reference → 'had'.","have":"✗ 'have' — wrong person (he = singular) and wrong tense here."},
        "We found out she ___ us all along.":            {"had lied to":"✓ Past perfect: the lying was before we found out (past event).","has lied to":"✗ Present perfect: 'found out' is past → the earlier action needs past perfect.","lied to":"✗ Simple past: 'we found out' signals the deception came first → past perfect."},
        "He ___ yet — try calling again.":              {"hasn't replied":"✓ Present perfect negative with 'yet' (expected action not completed yet).","hadn't replied":"✗ Past perfect negative: 'try calling again' shows the situation is current.","didn't reply":"✗ Simple past: 'yet' pairs with present perfect, not simple past."},
        "She ___ her project by the time I arrived.":   {"had submitted":"✓ Past perfect: submitted BEFORE I arrived (past event).","has submitted":"✗ Present perfect: 'by the time I arrived' is past → needs past perfect.","submitted":"✗ Simple past: sequence of past events → past perfect for the earlier one."},
        "I ___ that place — it feels familiar.":         {"have visited":"✓ Present perfect: past experience with present relevance ('feels familiar').","had visited":"✗ Past perfect: needs a past reference; 'feels' shows present relevance.","visited":"✗ Simple past: 'it feels familiar' shows present result → present perfect."},
        "By the time the show started, they ___ already.":{"had left":"✓ Past perfect: they left BEFORE the show started.","have left":"✗ Present perfect: 'by the time the show started' is past context.","left":"✗ Simple past: 'by the time + past event' → past perfect for the earlier action."},
    };

    // ── Question Bank ─────────────────────────────────────────
    const QUESTIONS = {
        easy: [
            { s: "She ___ just finished her homework.",            a: "has",  w: ["have", "had"] },
            { s: "They ___ never visited Paris.",                  a: "have", w: ["has", "had"] },
            { s: "He ___ already eaten lunch.",                    a: "has",  w: ["have", "had"] },
            { s: "I ___ lived here for five years.",               a: "have", w: ["has", "had"] },
            { s: "By the time we arrived, she ___ left.",          a: "had",  w: ["have", "has"] },
            { s: "We ___ not seen that film yet.",                  a: "have", w: ["has", "had"] },
            { s: "He ___ worked here since 2019.",                 a: "has",  w: ["have", "had"] },
            { s: "Before the test, she ___ studied all night.",    a: "had",  w: ["have", "has"] },
            { s: "I ___ never seen snow before.",                  a: "have", w: ["has", "had"] },
            { s: "The team ___ won every match this season.",      a: "has",  w: ["have", "had"] },
            { s: "We ___ already told them the news.",             a: "have", w: ["has", "had"] },
            { s: "She ___ just arrived at the station.",           a: "has",  w: ["have", "had"] },
            { s: "The students ___ submitted their work.",         a: "have", w: ["has", "had"] },
            { s: "He ___ completed the task before the deadline.", a: "had",  w: ["have", "has"] },
            { s: "My parents ___ lived in this city for 20 years.",a: "have", w: ["has", "had"] },
        ],
        medium: [
            { s: "She has ___ to school by bus today.",            a: "gone",    w: ["went", "goed"] },
            { s: "They have ___ the match against their rivals.",  a: "won",     w: ["win", "winned"] },
            { s: "He has ___ his textbook at home.",               a: "left",    w: ["leave", "leaved"] },
            { s: "I have ___ this movie three times.",             a: "seen",    w: ["saw", "seed"] },
            { s: "She has ___ a poem for the competition.",        a: "written", w: ["wrote", "writed"] },
            { s: "We have ___ lunch already.",                     a: "eaten",   w: ["ate", "eated"] },
            { s: "He had ___ the answer before she explained.",    a: "known",   w: ["knew", "knowed"] },
            { s: "She has ___ her phone somewhere.",               a: "lost",    w: ["lose", "losed"] },
            { s: "They have ___ their homework before dinner.",    a: "done",    w: ["did", "doing"] },
            { s: "He has ___ to Paris twice for work.",            a: "been",    w: ["went", "going"] },
            { s: "I have ___ hard for this exam.",                 a: "studied", w: ["study", "studying"] },
            { s: "She had ___ the book before the film came out.", a: "read",    w: ["readed", "reading"] },
            { s: "They have ___ their bags and are ready.",        a: "packed",  w: ["pack", "packing"] },
            { s: "He has ___ his bicycle to school.",              a: "ridden",  w: ["rode", "rided"] },
            { s: "She has ___ in this city since she was born.",   a: "lived",   w: ["live", "living"] },
        ],
        hard: [
            { s: "I ___ my keys — can you help me?",               a: "have lost",    w: ["had lost", "lost"] },
            { s: "Before he spoke, she ___ the answer.",            a: "had guessed",  w: ["has guessed", "guessed"] },
            { s: "___ you ever seen the Northern Lights?",          a: "Have",         w: ["Had", "Did"] },
            { s: "He told me he ___ the project.",                  a: "had finished", w: ["has finished", "finished"] },
            { s: "She ___ three films this month.",                 a: "has watched",  w: ["had watched", "watched"] },
            { s: "By noon, they ___ 10 km already.",               a: "had walked",   w: ["have walked", "walked"] },
            { s: "I recognised her because we ___ before.",         a: "had met",      w: ["have met", "met"] },
            { s: "She ___ just sent you a message.",                a: "has just sent",w: ["had just sent", "just sent"] },
            { s: "They ___ in Dubai for three years now.",          a: "have lived",   w: ["had lived", "lived"] },
            { s: "He ___ never tried sushi before that trip.",      a: "had",          w: ["has", "have"] },
            { s: "We found out she ___ us all along.",              a: "had lied to",  w: ["has lied to", "lied to"] },
            { s: "He ___ yet — try calling again.",                 a: "hasn't replied",w: ["hadn't replied", "didn't reply"] },
            { s: "She ___ her project by the time I arrived.",      a: "had submitted",w: ["has submitted", "submitted"] },
            { s: "I ___ that place — it feels familiar.",           a: "have visited", w: ["had visited", "visited"] },
            { s: "By the time the show started, they ___ already.", a: "had left",     w: ["have left", "left"] },
        ]
    };

    // ── State ─────────────────────────────────────────────────
    let gameState = 'MENU', currentMode = 'easy';
    let score = 0, lives = 3, qIndex = 0;
    let currentQ = null, opts = [];
    let timerDuration = 12000, timerStart = 0, timerRAF = 0;
    let qList = [], answered = false, streak = 0;

    // ── Sound Effects ─────────────────────────────────────────
    let _ac = null;
    const getAC = () => { if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)(); return _ac; };
    function playCorrect() { try { const c=getAC(),t=c.currentTime; [523,659,784].forEach((f,i)=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination); o.type='sine'; o.frequency.value=f; const s=t+i*.07; g.gain.setValueAtTime(.22,s); g.gain.exponentialRampToValueAtTime(.001,s+.13); o.start(s); o.stop(s+.13); }); } catch(e){} }
    function playWrong() { try { const c=getAC(),t=c.currentTime,o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination); o.type='sawtooth'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(90,t+.28); g.gain.setValueAtTime(.28,t); g.gain.exponentialRampToValueAtTime(.001,t+.3); o.start(t); o.stop(t+.3); } catch(e){} }
    function playCrash() { try { const c=getAC(),t=c.currentTime,o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination); o.type='triangle'; o.frequency.setValueAtTime(320,t); o.frequency.exponentialRampToValueAtTime(65,t+.6); g.gain.setValueAtTime(.4,t); g.gain.exponentialRampToValueAtTime(.001,t+.65); o.start(t); o.stop(t+.65); } catch(e){} }
    function playApplause() { try { const c=getAC(),t=c.currentTime,b=c.createBuffer(1,c.sampleRate*1.4,c.sampleRate),d=b.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; const src=c.createBufferSource(); src.buffer=b; const bpf=c.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=1100; bpf.Q.value=.4; const ng=c.createGain(); src.connect(bpf); bpf.connect(ng); ng.connect(c.destination); ng.gain.setValueAtTime(0,t); ng.gain.linearRampToValueAtTime(.3,t+.2); ng.gain.exponentialRampToValueAtTime(.001,t+1.3); src.start(t); src.stop(t+1.4); [523,659,784,1047].forEach((f,i)=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination); o.type='triangle'; o.frequency.value=f; const st=t+i*.09; g.gain.setValueAtTime(.18,st); g.gain.exponentialRampToValueAtTime(.001,st+.4); o.start(st); o.stop(st+.4); }); } catch(e){} }

    // ── Helpers ───────────────────────────────────────────────
    const shuffle = arr => [...arr].sort(() => Math.random() - 0.5);
    const livesHTML = n => '❤️'.repeat(Math.max(0,n)) + '🖤'.repeat(Math.max(0,3-n));

    function flashScreen(color) {
        const el = document.getElementById('flash');
        el.style.background = color; el.style.opacity = '0.32'; el.style.transition = 'none';
        requestAnimationFrame(() => { el.style.transition = 'opacity 0.35s'; el.style.opacity = '0'; });
    }
    function spawnPop(text, color) {
        const el = document.createElement('div'); el.className = 'score-pop';
        el.style.cssText = `color:${color};left:50%;top:38%;`; el.textContent = text;
        document.getElementById('game-container').appendChild(el);
        setTimeout(() => el.remove(), 860);
    }
    function showFeedback(text, color) {
        const el = document.getElementById('feedback');
        el.textContent = text; el.style.cssText = `color:${color};background:rgba(0,0,0,0.55);`;
        el.classList.remove('hidden'); clearTimeout(el._t);
        el._t = setTimeout(() => el.classList.add('hidden'), 900);
    }
    function showExplanation() {
        const exp = EXPLAIN[currentQ.s]; if (!exp) return;
        const content = document.getElementById('explain-content');
        content.innerHTML = opts.map(opt => {
            const isCorrect = opt === currentQ.a;
            const reason = exp[opt] || '';
            return `<div class="ep-row"><span class="ep-tag ${isCorrect?'correct':'wrong'}">${isCorrect?'✓':'✗'} <b>${opt}</b></span><span class="ep-why ${isCorrect?'correct':''}">${reason.replace(/^[✓✗] (Present|Past|Simple|'[^']*')[^—]*[—-] ?/,'')}</span></div>`;
        }).join('');
        document.getElementById('explain-panel').classList.remove('hidden');
    }

    // ── Timer ─────────────────────────────────────────────────
    function startTimer() {
        timerStart = performance.now(); cancelAnimationFrame(timerRAF);
        function tick() {
            if (answered || gameState !== 'PLAYING') return;
            const pct = Math.max(0, 1 - (performance.now() - timerStart) / timerDuration);
            const bar = document.getElementById('timer-bar');
            bar.style.width = (pct*100)+'%';
            bar.style.background = pct>0.5 ? '#facc15' : pct>0.25 ? '#f97316' : '#ff4b4b';
            if (pct <= 0) { onTimeout(); return; }
            timerRAF = requestAnimationFrame(tick);
        }
        timerRAF = requestAnimationFrame(tick);
    }
    function onTimeout() {
        if (answered) return; answered = true; streak = 0;
        playWrong(); flashScreen('rgba(255,75,75,0.4)');
        showFeedback('⏰ Time\'s up!  →  ' + currentQ.a, '#f97316');
        for (let i=0;i<3;i++) { const c=document.getElementById('c'+i); c.classList.add(opts[i]===currentQ.a?'reveal':'dim'); c.style.pointerEvents='none'; }
        showExplanation();
        lives--; document.getElementById('lives-display').innerHTML = livesHTML(lives);
        if (lives<=0) setTimeout(()=>endGame(false),1700); else setTimeout(nextQuestion,1800);
    }

    // ── Question Loading ──────────────────────────────────────
    function loadQuestion() {
        if (qIndex >= qList.length) { endGame(true); return; }
        currentQ = qList[qIndex]; answered = false;
        opts = shuffle([currentQ.a, ...currentQ.w]);
        document.getElementById('sentence-text').innerHTML = currentQ.s.replace('___','<span class="blank">___</span>');
        opts.forEach((opt,i) => {
            const c = document.getElementById('c'+i);
            c.querySelector('.ct').textContent = opt;
            c.className = 'choice-card'; c.style.opacity='1'; c.style.pointerEvents='all';
        });
        document.getElementById('q-counter').textContent = `Q ${qIndex+1}/${qList.length}`;
        document.getElementById('explain-panel').classList.add('hidden');
        timerDuration = Math.max(5000, (currentMode==='easy'?14000:currentMode==='medium'?12000:10000) - qIndex*150);
        startTimer();
    }

    // ── Answer Handling ───────────────────────────────────────
    function choose(idx) {
        if (answered || gameState !== 'PLAYING') return;
        answered = true; cancelAnimationFrame(timerRAF);
        const chosen = opts[idx];
        for (let i=0;i<3;i++) document.getElementById('c'+i).style.pointerEvents='none';
        const card = document.getElementById('c'+idx);
        if (chosen === currentQ.a) {
            card.classList.add('correct'); streak++;
            const pct = Math.max(0, 1-(performance.now()-timerStart)/timerDuration);
            const bonus = Math.round(pct*50) + (streak>=3?20:0);
            score += 100+bonus;
            document.getElementById('score-val').textContent = score;
            flashScreen('rgba(0,255,136,0.3)');
            const msg = streak>=3 ? `🔥 ×${streak} Streak!  +${100+bonus}` : `✓ Correct!  +${100+bonus}`;
            showFeedback(msg,'#00ff88'); spawnPop('+'+(100+bonus),'#00ff88'); playCorrect();
            document.getElementById('sentence-text').innerHTML = currentQ.s.replace('___',`<span class="filled">${currentQ.a}</span>`);
            setTimeout(nextQuestion,750);
        } else {
            card.classList.add('wrong');
            for (let i=0;i<3;i++) if (opts[i]===currentQ.a) document.getElementById('c'+i).classList.add('reveal');
            streak=0; lives--;
            document.getElementById('lives-display').innerHTML = livesHTML(lives);
            flashScreen('rgba(255,75,75,0.4)');
            showFeedback('✗ Wrong!  Answer: '+currentQ.a,'#ff6b6b');
            playWrong(); showExplanation();
            if (lives<=0) setTimeout(()=>endGame(false),1700); else setTimeout(nextQuestion,1800);
        }
    }
    function nextQuestion() { qIndex++; loadQuestion(); }

    // ── Game Control ──────────────────────────────────────────
    function startGame(mode) {
        currentMode=mode; score=0; lives=3; qIndex=0; streak=0; answered=false;
        qList = shuffle(QUESTIONS[mode]);
        document.getElementById('score-val').textContent='0';
        document.getElementById('lives-display').innerHTML=livesHTML(3);
        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('question-zone').classList.remove('hidden');
        document.getElementById('feedback').classList.add('hidden');
        gameState='PLAYING'; loadQuestion();
    }
    function endGame(won) {
        cancelAnimationFrame(timerRAF); gameState='OVER';
        document.getElementById('question-zone').classList.add('hidden');
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('feedback').classList.add('hidden');
        const hsKey='tenseQuestHS_'+currentMode;
        const hs=parseInt(localStorage.getItem(hsKey)||'0');
        const newHS=score>hs; if(newHS) localStorage.setItem(hsKey,score);
        document.getElementById('end-title').textContent=won?'COMPLETE! 🎉':'GAME OVER';
        document.getElementById('final-score').textContent=won
            ?`All ${qList.length} questions done!  Score: ${score}`
            :`Score: ${score}  (Q ${qIndex}/${qList.length} answered)`;
        document.getElementById('hs-note').textContent=newHS?'🏆 NEW HIGH SCORE!':'Best: '+hs;
        document.getElementById('game-over').classList.remove('hidden');
        if(won){setTimeout(playApplause,300);}else{playCrash();if(newHS)setTimeout(playApplause,500);}
    }
    function showMenu() {
        cancelAnimationFrame(timerRAF); gameState='MENU';
        document.getElementById('main-menu').classList.remove('hidden');
        document.getElementById('game-over').classList.add('hidden');
        document.getElementById('hud').classList.add('hidden');
        document.getElementById('question-zone').classList.add('hidden');
        document.getElementById('feedback').classList.add('hidden');
    }

    // ── Input ─────────────────────────────────────────────────
    for (let i=0;i<3;i++) {
        const c=document.getElementById('c'+i);
        c.addEventListener('click',()=>choose(i));
        c.addEventListener('touchstart',(e)=>{e.preventDefault();choose(i);},{passive:false});
        c.addEventListener('keydown',(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();choose(i);}});
    }
    window.addEventListener('keydown',(e)=>{
        if(gameState==='MENU'){if(e.key==='1')startGame('easy');if(e.key==='2')startGame('medium');if(e.key==='3')startGame('hard');}
        else if(gameState==='PLAYING'){if(e.key==='1')choose(0);if(e.key==='2')choose(1);if(e.key==='3')choose(2);}
        else if(gameState==='OVER'){if(e.code==='Enter')startGame(currentMode);if(e.key.toUpperCase()==='M')showMenu();}
    });

    // ── Render Loop ───────────────────────────────────────────
    (function loop(){drawBG();requestAnimationFrame(loop);})();
</script>
